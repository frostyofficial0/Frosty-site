<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frosty RP Kauppa</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1120,#1e3a8a,#38bdf8);
color:white;
text-align:center;
}

header{
padding:80px 20px;
}

h1{
font-size:60px;
margin:0;
}

p{
font-size:22px;
color:#ddd;
}

.btn{
display:inline-block;
margin-top:15px;
padding:15px 35px;
background:#00bfff;
color:white;
text-decoration:none;
border-radius:10px;
font-size:20px;
}

section{
padding:50px 20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:25px;
margin:20px auto;
max-width:800px;
border-radius:15px;
}

.shop{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.product{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
}

.price{
font-size:35px;
margin:10px 0;
font-weight:bold;
}

footer{
padding:30px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>❄ Frosty RP ❄</h1>
<p>Virallinen FiveM kauppa</p>
<a class="btn" href="#">Liity Discordiin</a>
</header>

<section>
<div class="card">
<h2>F-Coin Kauppa</h2>
<p>Osta krediittejä helposti PayPalilla</p>
</div>

<div class="shop">

<div class="product">
<h2>5 000 F-Coin</h2>
<div class="price">5€</div>
<a class="btn" href="https://paypal.me/SUNNIMI/5">Osta</a>
</div>

<div class="product">
<h2>10 000 F-Coin</h2>
<div class="price">10€</div>
<a class="btn" href="https://paypal.me/SUNNIMI/10">Osta</a>
</div>

<div class="product">
<h2>20 000 F-Coin</h2>
<div class="price">20€</div>
<a class="btn" href="https://paypal.me/SUNNIMI/20">Osta</a>
</div>

<div class="product">
<h2>50 000 F-Coin</h2>
<div class="price">50€</div>
<a class="btn" href="https://paypal.me/SUNNIMI/50">Osta</a>
</div>

</div>
</section>

<footer>
© 2026 Frosty RP
</footer>

</body>
</html>
